<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Webpage as Image</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
      </div>
      <h1>Snap&Save</h1>
    </header>

    <main class="content">
      <p class="description">Capture full scrolling webpage easily.</p>
      
      <div class="actions">
        <button id="btn-png" class="btn btn-primary">
          <span class="btn-text">Save as PNG</span>
        </button>
        <button id="btn-jpg" class="btn btn-secondary">
          <span class="btn-text">Save as JPG</span>
        </button>
      </div>
      
      <div id="status" class="status-msg hidden">
        <div class="spinner"></div>
        <span>Capturing... Please wait.</span>
      </div>
      <div id="error" class="error-msg hidden"></div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
